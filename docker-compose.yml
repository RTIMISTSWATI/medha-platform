version: "3.9"

services:
  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - code-execution
      - server
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_JUDGE_URL=http://localhost:5001

  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - ai-engine

  code-execution:
    build: ./code-execution
    ports:
      - "5001:5001"

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    env_file:
      - ./ai-engine/.env
